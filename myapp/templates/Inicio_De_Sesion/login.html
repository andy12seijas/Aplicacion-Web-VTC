
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Fibra - Iniciar Sesión</title>
    
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 50%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        h2 {
            color: #1a1a1a;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .subtitle a {
            color: #ff6b00;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .subtitle a:hover {
            color: #ff8c00;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6b00;
            font-size: 1.1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }

        input::placeholder {
            color: #999;
            font-size: 0.95rem;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-password a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #ff6b00;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff8c00, #ff6b00);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #ff6b00, #ff5500);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .messages {
            margin-bottom: 1.5rem;
        }

        .error {
            background: linear-gradient(135deg, #fff5f5, #ffe5e5);
            color: #d63031;
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid #d63031;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        .error i {
            font-size: 1.2rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }

        .footer p {
            margin: 0.3rem 0;
        }

        .footer i {
            color: #ff6b00;
            margin: 0 5px;
        }

        /* Estilos responsivos */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .logo {
                max-width: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <!-- Aquí va el logo de Simple Fibra -->
            <img src="/static/cd.png" alt="Simple Fibra Logo" class="logo">
            
        </div>
        
        <div class="subtitle">
            <i class="fas fa-wifi" style="color: #ff6b00; margin-right: 5px;"></i>
            Conectamos tu mundo
        </div>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="error">
                <i class="fas fa-exclamation-circle"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">
                    <i class=""></i>
                    Usuario
                </label>
                <i class=""></i>
                <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class=""></i>
                    Contraseña
                </label>
                <i class=""></i>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <div class="forgot-password">
                <a href="#">
                    <i class="fas fa-question-circle"></i>
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
            
            <button type="submit">
                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                Iniciar Sesión
            </button>
        </form>
        
        <div class="footer">
            <p>
                <i class="fas fa-shield-alt"></i>
                Conexión segura
            </p>
            <p>
                &copy; 2026 Simple Fibra. Todos los derechos reservados.
            </p>
        </div>
    </div>
</body>
</html>
